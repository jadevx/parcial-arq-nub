<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#333;line-height:1.6;max-width:960px;margin:0 auto;padding:2rem;background:#FFF}
    h1{color:#111;border-bottom:3px solid #333;padding-bottom:.5rem;margin-bottom:1.5rem;font-size:1.8rem}
    h2{color:#222;margin-top:2rem;margin-bottom:.8rem;font-size:1.4rem;border-bottom:1px solid #ccc;padding-bottom:.3rem}
    h3{color:#333;margin-top:1.5rem;margin-bottom:.5rem;font-size:1.15rem}
    h4{margin-top:1rem;margin-bottom:.4rem}
    p{margin-bottom:.8rem} ul,ol{margin-bottom:.8rem;padding-left:1.5rem} li{margin-bottom:.3rem}
    table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.9rem}
    th{background:#333;color:#FFF;padding:.6rem .8rem;text-align:left;font-weight:600}
    td{padding:.5rem .8rem;border-bottom:1px solid #ddd} tr:nth-child(even) td{background:#f9f9f9}
    code{background:#f5f5f5;padding:.15rem .4rem;border-radius:3px;font-size:.88rem}
    pre{background:#f5f5f5;padding:1rem;border-radius:6px;overflow-x:auto;margin:1rem 0;border:1px solid #ddd} pre code{background:none;padding:0}
    blockquote{border-left:4px solid #333;padding:.5rem 1rem;margin:1rem 0;background:#f9f9f9;border-radius:0 6px 6px 0}
    hr{border:none;border-top:2px solid #ddd;margin:2rem 0}
    img{max-width:100%;height:auto;border:1px solid #ddd;border-radius:4px;margin:1rem 0;display:block}
    .mermaid{margin:1.5rem 0;text-align:center;padding:1rem;background:#fafafa;border:1px solid #ddd;border-radius:8px}
    @media print{body{max-width:100%;padding:1cm}img{max-width:100%;page-break-inside:avoid}.mermaid{page-break-inside:avoid}}
  </style>
</head>
<body>
  <h1>$title$</h1>
  $body$
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
  </script>
</body>
</html>
